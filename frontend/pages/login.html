<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vibes & Juice</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        /* Decorative blobs behind the card */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 300px; height: 300px;
            background: var(--primary);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 250px; height: 250px;
            background: var(--accent);
            bottom: -50px; right: -80px;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }
        .brand-logo {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: var(--text-main);
            letter-spacing: -1.5px;
            line-height: 1.1;
        }
        .brand-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .btn-login {
            width: 100%;
            margin-top: 1.5rem;
            padding: 14px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="card login-card animate-slide-up">
            <div class="brand-logo">COME BRO<br><span class="vibrant-text">CHILL BRO</span></div>
            <div class="brand-subtitle">Smart Juice Shop System</div>
            <form id="login-form">
                <div class="form-group animate-fade-in" style="animation-delay: 0.2s;">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group animate-fade-in" style="animation-delay: 0.3s;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-login animate-fade-in" style="animation-delay: 0.4s;">Login to System</button>
            </form>
        </div>
    </div>
    
    <script src="/frontend/js/config.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
