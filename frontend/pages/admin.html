<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MY BRO SWEET BRO</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 80px);
            gap: 20px;
            padding: 20px;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-btn {
            width: 100%;
            text-align: left;
            padding: 15px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .sidebar-btn:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }
        .sidebar-btn.active {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 165, 82, 0.3);
        }

        /* Content Area */
        .content-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Overview Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-shadow: var(--glow-primary);
            margin: 10px 0;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .data-table th, .data-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            background: var(--bg-main);
            color: var(--text-main);
            font-weight: 800;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        .img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(93, 64, 55, 0.3); /* Warm brown translucent overlay */
            backdrop-filter: blur(8px);
            z-index: 1000;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 550px;
            border: none;
            box-shadow: 0 20px 60px rgba(93, 64, 55, 0.1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: var(--accent-primary); border-bottom: 2px solid var(--accent-primary); padding-bottom: 5px; }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--danger); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">MY BRO<span> SWEET BRO</span> | Admin</div>
        <div class="nav-actions">
            <span id="user-display" class="text-muted"></span>
            <button id="logout-btn" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <button class="sidebar-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="sidebar-btn" onclick="switchTab('menu')">Menu Management</button>
            <button class="sidebar-btn" onclick="switchTab('orders')">Recent Orders</button>
        </div>

        <!-- Content Area -->
        <div class="content">
            
            <!-- Overview Section -->
            <section id="overview" class="content-section active">
                <h2>Business Overview</h2>
                <br>
                <div class="overview-grid">
                    <div class="stat-card">
                        <div class="stat-label">Today's Revenue</div>
                        <div class="stat-value" id="stat-revenue">₹0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" id="stat-orders">0</div>
                    </div>
                </div>
            </section>

            <!-- Menu Management Section -->
            <section id="menu" class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Menu Items</h2>
                    <button class="btn btn-primary" onclick="openMenuModal()">+ Add New Item</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price (₹)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="menu-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>

            <!-- Recent Orders Section -->
            <section id="orders" class="content-section">
                <h2>Recent Completed Orders</h2>
                <br>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Table</th>
                            <th>Type</th>
                            <th>Amount (₹)</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>

        </div>
    </div>

    <!-- Add/Edit Menu Modal -->
    <div id="menu-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Menu Item</h2>
                <button class="close-btn" onclick="closeMenuModal()">&times;</button>
            </div>
            <form id="menu-form">
                <input type="hidden" id="menu-id">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="menu-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="menu-price" class="form-control" min="1" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="menu-image" class="form-control" placeholder="https://..." required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">Save Item</button>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
