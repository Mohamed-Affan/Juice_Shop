<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Shop - Admin Dashboard</title>
    
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons for UI Elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="dashboard-body">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="ph-fill ph-orange-slice"></i>
                <h2>FreshJuice</h2>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li class="active"><a href="admin.html"><i class="ph ph-squares-four"></i> Admin Dashboard</a></li>
                <li><a href="counter.html"><i class="ph ph-storefront"></i> Counter</a></li>
                <li><a href="kitchen.html"><i class="ph ph-cooking-pot"></i> Kitchen</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <p>&copy; 2026 Juice Shop</p>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="top-header">
            <div>
                <h1>Dashboard Overview</h1>
                <p class="subtitle">Welcome back, Admin. Here's what's happening today.</p>
            </div>
            <div class="user-profile">
                <div class="avatar">
                    <i class="ph ph-user"></i>
                </div>
            </div>
        </header>

        <!-- Stats Overview Cards -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon earning"><i class="ph ph-currency-circle-dollar"></i></div>
                <div class="stat-info">
                    <h3>Today's Earnings</h3>
                    <p class="stat-value" id="total-earnings">₹0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orders"><i class="ph ph-receipt"></i></div>
                <div class="stat-info">
                    <h3>Total Orders</h3>
                    <p class="stat-value" id="total-orders">0</p>
                </div>
            </div>
        </section>

        <div class="dashboard-grid">
            <!-- Menu Management Section -->
            <section class="card menu-management-card">
                <div class="card-header">
                    <h2>Menu Management</h2>
                    <button class="btn btn-primary" id="add-menu-btn" onclick="openMenuModal()">
                        <i class="ph ph-plus"></i> Add Item
                    </button>
                </div>
                <div class="table-container">
                    <table class="data-table" id="menu-table">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>Price (₹)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="menu-table-body">
                            <!-- Menu items will be injected here via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Today's Orders Summary Section -->
            <section class="card orders-summary-card">
                <div class="card-header">
                    <h2>Recent Orders</h2>
                </div>
                <div class="table-container">
                    <table class="data-table" id="recent-orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Table</th>
                                <th>Status</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="recent-orders-body">
                            <!-- Recent orders will be injected here via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Add/Edit Menu Item Modal -->
    <div class="modal-overlay" id="menu-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add Menu Item</h3>
                <button class="close-modal" onclick="closeMenuModal()"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="menu-form" onsubmit="handleMenuSubmit(event)">
                    <input type="hidden" id="item-id">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="e.g. Mango Juice" required>
                    </div>
                    <div class="form-group">
                        <label for="item-price">Price (₹)</label>
                        <input type="number" id="item-price" placeholder="e.g. 100" min="0" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeMenuModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/script.js"></script>
</body>
</html>
